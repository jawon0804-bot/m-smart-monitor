name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 22 설정
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 의존성 설치
        working-directory: functions
        run: npm ci

      - name: 서비스 계정 키 파일 생성
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/gcp-key.json

      - name: Firebase Functions + Hosting(monitor) 배포
        working-directory: functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions:collectMetrics,functions:getDashboardData,hosting:monitor --project m-smart-90148 --non-interactive
