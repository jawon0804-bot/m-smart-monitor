name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'
  # 수동으로 "최신 main 기준" 배포를 트리거하고 싶을 때 (Actions 탭 > Run workflow)
  workflow_dispatch:

# 같은 워크플로가 동시에 두 개 이상 돌지 않도록 막습니다.
# 짧은 시간에 커밋을 여러 번 푸시해도, 이전 배포가 끝날 때까지
# 다음 배포는 대기했다가 순서대로 실행됩니다 (Cloud Functions 409 충돌 방지).
concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 22 설정
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 의존성 설치
        working-directory: functions
        run: npm ci

      - name: 서비스 계정 키 파일 생성
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/gcp-key.json

      - name: Firebase Functions + Hosting(monitor) 배포
        working-directory: functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions:collectMetrics,functions:getDashboardData,hosting:monitor --project m-smart-90148 --non-interactive
